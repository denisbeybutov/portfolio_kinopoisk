<!DOCTYPE html>
<html lang="en" class="page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>
<body class="page__body">
    <div class="app">
        <div class="container app__container">

            <div class="app__title">
                <p>Кинопремьеры </p>
                <button class="app__title-button" id="month">
                    <p class="month" data-id="month"></p>
                    <img class="app__title-img" src="./icons/arrow-bottom.svg" alt="" data-id="month">
                    <ul class="app__month-list hidden">
                        <div class="li app__month-item" data-month-id="0">Январь</div>
                        <div class="li app__month-item" data-month-id="1">Феварль</div>
                        <div class="li app__month-item" data-month-id="2">Март</div>
                        <div class="li app__month-item" data-month-id="3">Апрель</div>
                        <div class="li app__month-item" data-month-id="4">Май</div>
                        <div class="li app__month-item" data-month-id="5">Июнь</div>
                        <div class="li app__month-item" data-month-id="6">Июль</div>
                        <div class="li app__month-item" data-month-id="7">Август</div>
                        <div class="li app__month-item" data-month-id="8">Сентябрь</div>
                        <div class="li app__month-item" data-month-id="9">Октябрь</div>
                        <div class="li app__month-item" data-month-id="10">Ноябрь</div>
                        <div class="li app__month-item" data-month-id="11">Декабрь</div>
                    </ul>
                </button>
                
                <button class="app__title-button" id="year">
                    <p class="year" data-id="year"></p>
                    <img class="app__title-img" src="./icons/arrow-bottom.svg" alt="" data-id="year">
                    <ul class="app__year-list hidden"></ul>
                </button>
            </div>

            <!-- <div class="input">
                
                <input class="input__inp" id="input" type="month">
            </div> -->

            
            <ul class="list-reset app__list"></ul>            
            <ul class="list-reset app__pagination"></ul>

            <div class="top-shows">
                <p class="top-shows__header">Популярные сериалы</p>
                <ul class="top-shows__list"></ul>
                <button class="top-shows__more">Показать еще</button>
            </div>
            

            <div class="modal hidden" data-close="true"> 
                               
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
